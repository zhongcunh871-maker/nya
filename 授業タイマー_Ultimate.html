<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>授業タイマー Ultimate</title>
<style>
:root{--bg1:#0f172a;--bg2:#1d4ed8;--ok:#22c55e;--warn:#f59e0b;--text:#fff}
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:linear-gradient(-45deg,var(--bg1),#1e3a8a,var(--bg2),#06b6d4);background-size:400% 400%;animation:bg 16s ease infinite;color:var(--text)}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.wrap{max-width:900px;margin:24px auto;padding:18px}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.2);border-radius:28px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1{text-align:center;margin:0 0 10px}.date{text-align:center;opacity:.9}.clock{text-align:center;font-size:clamp(48px,8vw,84px);font-weight:800}
.status{text-align:center;font-size:34px;margin:8px}.remain{text-align:center;font-size:42px;font-weight:700;color:#fde68a}
.progress{height:22px;background:#ffffff30;border-radius:99px;overflow:hidden;margin:18px 0}.fill{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);transition:width 1s}
.pct{text-align:right}.panel{display:grid;gap:14px}.item{background:#ffffff18;border-radius:16px;padding:16px;font-size:21px}
.flash{animation:f .8s infinite}@keyframes f{50%{opacity:.3}}
.small{text-align:center;opacity:.8}
</style></head><body><div class="wrap"><div class="card">
<h1>📚 授業タイマー Ultimate</h1>
<div class="date" id="date"></div>
<div class="clock" id="clock"></div>
<div class="status" id="status"></div>
<div class="progress"><div class="fill" id="fill"></div></div>
<div class="pct" id="pct"></div>
<div class="remain" id="remain"></div>
<div class="panel" id="keywords"><div class="item">読み込み中...</div></div>
<div class="small">Google Apps Script連携</div>
</div></div>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";
const schedule=[{name:"1限",start:"09:20",end:"10:10"},{name:"2限",start:"10:20",end:"11:10"},{name:"3限",start:"11:20",end:"12:10"}];
const S=t=>{let[a,b]=t.split(":").map(Number);return a*3600+b*60}
let beeped=false;
function beep(){try{let c=new(window.AudioContext||webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.05;o.start();o.stop(c.currentTime+.2);}catch{}}
function tick(){
const n=new Date(),sec=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
date.textContent=n.toLocaleDateString("ja-JP",{dateStyle:"full"});
clock.textContent=n.toLocaleTimeString("ja-JP");
let st="🎉 今日の授業は終了しました",rm="",p=100,left=9999;
document.body.style.filter="none";
for(const l of schedule){
 let a=S(l.start),b=S(l.end);
 if(sec<a){left=a-sec;st="🕒 次は "+l.name;rm=`開始まで ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;p=0;break;}
 if(sec>=a&&sec<b){left=b-sec;st="📖 "+l.name+" 授業中";rm=`残り ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;p=(sec-a)/(b-a)*100;break;}
}
status.textContent=st;remain.textContent=rm;fill.style.width=p+"%";pct.textContent=Math.round(p)+"%";
if(left<=300&&left>0){remain.classList.add("flash")}else{remain.classList.remove("flash")}
if(left===60&&!beeped){beep();beeped=true}
if(left>60)beeped=false;
}
async function load(){
try{
const data=await(await fetch(GAS_URL)).json();
const today=new Date().toLocaleDateString("sv-SE");
let h="";
for(const i of data){
 if(!i.date)continue;
 if(new Date(i.date).toLocaleDateString("sv-SE")!==today)continue;
 if(i.mode==="登校")h+=`<div class=item>🏫 <b>登校</b><br>${i.inKey}</div>`;
 if(i.type==="授業")h+=`<div class=item>📚 <b>${i.subject}</b><br>${i.lessonKey}</div>`;
 if(i.mode==="下校")h+=`<div class=item>🏠 <b>下校</b><br>${i.outKey}</div>`;
}
keywords.innerHTML=h||'<div class="item">🎌 本日は休日です</div>';
}catch{keywords.innerHTML='<div class="item">⚠️ データ取得に失敗しました</div>';}
}
tick();load();setInterval(tick,1000);setInterval(load,30000);
</script></body></html>
