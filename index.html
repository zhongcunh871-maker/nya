<script>
const schedule = [
  {name:"1限目", start:"09:20", end:"10:10"},
  {name:"2限目", start:"10:20", end:"11:10"},
  {name:"3限目", start:"11:20", end:"12:10"}
];

function toSeconds(time){
  const [h,m]=time.split(":").map(Number);
  return h*3600+m*60;
}

function update(){
  const now=new Date();
  const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  let status="授業は終了しています";
  let remain="";

  for(const s of schedule){
    const start=toSeconds(s.start);
    const end=toSeconds(s.end);

    if(nowSec>=start && nowSec<end){
      const left=end-nowSec;
      const min=Math.floor(left/60);
      const sec=left%60;
      status=`📖 ${s.name}中`;
      remain=`⏳ 残り ${min}分 ${sec.toString().padStart(2,"0")}秒`;
      break;
    }

    if(nowSec<start){
      const left=start-nowSec;
      const min=Math.floor(left/60);
      const sec=left%60;
      status=`🕒 次は${s.name}`;
      remain=`開始まで ${min}分 ${sec.toString().padStart(2,"0")}秒`;
      break;
    }
  }

  document.getElementById("status").textContent=status;
  document.getElementById("time").textContent=remain;
}

update();
setInterval(update,1000);
</script>
