<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業タイマー</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.card{
  max-width:700px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  padding:25px;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h1{
  text-align:center;
  margin-bottom:10px;
}

#today{
  text-align:center;
  font-size:18px;
  color:#666;
  margin-bottom:20px;
}

#status{
  font-size:30px;
  font-weight:bold;
  text-align:center;
}

#time{
  text-align:center;
  font-size:42px;
  color:#1976d2;
  font-weight:bold;
  margin:15px 0;
}

.lesson{
  margin-top:20px;
}

.item{
  background:#f7f7f7;
  border-radius:12px;
  padding:15px;
  margin:10px 0;
  font-size:22px;
}

.now{
  background:#d7ffd7;
  border:2px solid #3cb371;
}

.holiday{
  text-align:center;
  font-size:24px;
  color:#d32f2f;
  margin-top:30px;
}
</style>

</head>

<body>

<div class="card">

<h1>📚 今日の授業</h1>

<div id="today"></div>

<div id="status"></div>

<div id="time"></div>

<div id="keywords"></div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";

const schedule=[
{name:"1限",start:"09:20",end:"10:10"},
{name:"2限",start:"10:20",end:"11:10"},
{name:"3限",start:"11:20",end:"12:10"}
];
function toSeconds(time){
  const [h,m]=time.split(":").map(Number);
  return h*3600+m*60;
}

function updateTimer(){

  const now=new Date();

  const yyyy=now.getFullYear();
  const mm=String(now.getMonth()+1).padStart(2,"0");
  const dd=String(now.getDate()).padStart(2,"0");

  document.getElementById("today").textContent=
    `${yyyy}/${mm}/${dd}`;

  const nowSec=
    now.getHours()*3600+
    now.getMinutes()*60+
    now.getSeconds();

  let status="授業は終了しました";
  let remain="";

  for(const lesson of schedule){

    const start=toSeconds(lesson.start);
    const end=toSeconds(lesson.end);

    if(nowSec>=start && nowSec<end){

      const left=end-nowSec;

      status=`📖 ${lesson.name} 授業中`;

      remain=`⏳ 残り ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;

      break;

    }

    if(nowSec<start){

      const left=start-nowSec;

      status=`🕒 次は ${lesson.name}`;

      remain=`開始まで ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;

      break;

    }

  }

  document.getElementById("status").textContent=status;
  document.getElementById("time").textContent=remain;

}

updateTimer();
setInterval(updateTimer,1000);
async function loadKeywords(){

  try{

    const res=await fetch(GAS_URL);
    const data=await res.json();

    const today=new Date();

    const y=today.getFullYear();
    const m=String(today.getMonth()+1).padStart(2,"0");
    const d=String(today.getDate()).padStart(2,"0");

    const todayText=`${y}/${m}/${d}`;

    const todayData=data.filter(item=>{

      if(!item.date) return false;

      const date=new Date(item.date);

      const yy=date.getFullYear();
      const mm=String(date.getMonth()+1).padStart(2,"0");
      const dd=String(date.getDate()).padStart(2,"0");

      return `${yy}/${mm}/${dd}`===todayText;

    });

    if(todayData.length===0){

      document.getElementById("keywords").innerHTML=`
      <div class="holiday">
      🎌 本日は休日です
      <br><br>
      授業はありません。
      </div>`;

      return;

    }

    let html="";

    todayData.forEach(item=>{

      if(item.mode==="登校"){
        html+=`<div class="item">🏫 登校：${item.inKey}</div>`;
      }

      if(item.type==="授業"){
        html+=`<div class="item">📚 ${item.subject}<br><b>${item.lessonKey}</b></div>`;
      }

      if(item.mode==="下校"){
        html+=`<div class="item">🏠 下校：${item.outKey}</div>`;
      }

    });

    document.getElementById("keywords").innerHTML=html;

  }catch(e){

    document.getElementById("keywords").innerHTML=
    `<div class="holiday">
    読み込みエラー
    </div>`;

    console.error(e);

  }

}

loadKeywords();

setInterval(loadKeywords,30000);
</script>

</body>
</html>
