<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業タイマー</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:#f3f4f6;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:20px;
    margin:20px auto;
    max-width:600px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1,h2{
    text-align:center;
}

#status{
    font-size:30px;
    font-weight:bold;
    text-align:center;
}

#time{
    font-size:42px;
    color:#1976d2;
    text-align:center;
    font-weight:bold;
}

#keywords p{
    font-size:22px;
    margin:8px 0;
}
</style>
</head>

<body>

<div class="card">
<h1>📚授業タイマー</h1>

<p id="status"></p>

<p id="time"></p>
</div>

<div class="card">
<h2>授業キーワード</h2>

<div id="keywords">
読み込み中...
</div>
</div>

<script>
const schedule = [
  { name: "1限目", start: "09:20", end: "10:10" },
  { name: "2限目", start: "10:20", end: "11:10" },
  { name: "3限目", start: "11:20", end: "12:10" }
];

function toSeconds(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 3600 + m * 60;
}

function updateTimer() {
  const now = new Date();
  const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

  let status = "今日は授業が終了しました";
  let remain = "";

  for (const lesson of schedule) {
    const start = toSeconds(lesson.start);
    const end = toSeconds(lesson.end);

    if (nowSec >= start && nowSec < end) {
      const left = end - nowSec;
      const min = Math.floor(left / 60);
      const sec = left % 60;

      status = `📖 ${lesson.name}`;
      remain = `⏳ 残り ${min}分 ${String(sec).padStart(2, "0")}秒`;
      break;
    }

    if (nowSec < start) {
      const left = start - nowSec;
      const min = Math.floor(left / 60);
      const sec = left % 60;

      status = `🕒 次は ${lesson.name}`;
      remain = `開始まで ${min}分 ${String(sec).padStart(2, "0")}秒`;
      break;
    }
  }

  document.getElementById("status").textContent = status;
  document.getElementById("time").textContent = remain;
}

updateTimer();
setInterval(updateTimer, 1000);
async function loadKeywords() {
  const url = "https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";

  try {
    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    data.forEach(item => {
      if (item.mode === "登校") {
        html += `<p>🏫 登校：${item.inKey}</p>`;
      }

      if (item.type === "授業") {
        html += `<p>📚 ${item.subject}：${item.lessonKey}</p>`;
      }

      if (item.mode === "下校") {
        html += `<p>🏠 下校：${item.outKey}</p>`;
      }
    });

    document.getElementById("keywords").innerHTML = html;

  } catch (e) {
    document.getElementById("keywords").innerHTML =
      "<p>❌ キーワードを読み込めませんでした。</p>";
    console.error(e);
  }
}

loadKeywords();
setInterval(loadKeywords, 30000);
