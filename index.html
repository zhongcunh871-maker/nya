<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>授業タイマー Ultimate</title>


<style>

:root{
--bg1:#020617;
--bg2:#1d4ed8;
--cyan:#06b6d4;
--green:#22c55e;
--yellow:#eab308;
--red:#ef4444;
}


*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

font-family:
system-ui,
"Noto Sans JP",
sans-serif;

color:white;


background:
linear-gradient(
-45deg,
#020617,
#1e3a8a,
#2563eb,
#06b6d4
);


background-size:400% 400%;

animation:
bg 15s infinite;


}



@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.wrapper{

max-width:1000px;

margin:auto;

padding:20px;

}



.card{

background:
rgba(255,255,255,.12);


backdrop-filter:
blur(20px);


border-radius:30px;


padding:25px;


border:
1px solid rgba(255,255,255,.25);


box-shadow:
0 25px 70px rgba(0,0,0,.4);

}



h1{

text-align:center;

font-size:
clamp(28px,5vw,45px);

margin:0;

}



.date{

text-align:center;

opacity:.8;

margin-top:10px;

}




/* 円形タイマー */


.timer{

display:flex;

justify-content:center;

margin:35px;

}



.circle{

position:relative;

width:280px;

height:280px;

}



svg{

transform:rotate(-90deg);

}



.bg-circle{

fill:none;

stroke:
rgba(255,255,255,.15);

stroke-width:18;

}



.progress-circle{

fill:none;

stroke:
url(#color);

stroke-width:18;

stroke-linecap:round;

transition:
stroke-dashoffset 1s linear;

}



.center{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

text-align:center;

}



.clock{

font-size:38px;

font-weight:900;

}



.remain{

font-size:22px;

color:#fde68a;

}



.status{

text-align:center;

font-size:28px;

font-weight:bold;

margin:15px;

}



.flash{

animation:
flash .8s infinite;

}


@keyframes flash{

50%{
opacity:.3;
}

}





.section{

margin-top:35px;

}



.title{

font-size:26px;

font-weight:bold;

border-bottom:
2px solid rgba(255,255,255,.3);

padding-bottom:8px;

}



.box{

margin-top:15px;

display:grid;

gap:12px;

}



.keyword{

background:
rgba(255,255,255,.12);

border-radius:18px;

padding:15px;

}



.today{

border-left:
5px solid #22c55e;

}


.history{

border-left:
5px solid #38bdf8;

}



.line{

text-align:center;

margin-top:35px;

}



.line img{

height:50px;

}



.footer{

text-align:center;

opacity:.7;

margin-top:20px;

}




@media(max-width:600px){

.circle{

width:220px;

height:220px;

}


.clock{

font-size:30px;

}


.status{

font-size:22px;

}


}


</style>

</head>


<body>


<div class="wrapper">


<div class="card">


<h1>
📚 授業タイマー Ultimate
</h1>


<div class="date" id="date"></div>



<div class="timer">


<div class="circle">


<svg width="280" height="280">


<defs>

<linearGradient id="color">

<stop offset="0%" stop-color="#22c55e"/>

<stop offset="50%" stop-color="#eab308"/>

<stop offset="100%" stop-color="#ef4444"/>

</linearGradient>


</defs>


<circle
class="bg-circle"
cx="140"
cy="140"
r="110"
/>


<circle
id="progress"
class="progress-circle"
cx="140"
cy="140"
r="110"
/>


</svg>



<div class="center">


<div class="clock" id="clock">
00:00:00
</div>


<div class="remain" id="remain">
起動中
</div>


</div>


</div>


</div>



<div class="status" id="status">

起動中...

</div>




<div class="section">


<div class="title">

📌 今日のキーワード

</div>


<div id="today" class="box">

読み込み中...

</div>


</div>




<div class="section">


<div class="title">

📚 過去のキーワード履歴

</div>


<div id="history" class="box">

読み込み中...

</div>


</div>



<div class="line">

<a href="https://lin.ee/YkfIPJ8">

<img
src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png"
alt="友だち追加">

</a>

</div>



<div class="footer">

Google Apps Script 連携

</div>


</div>

</div>


<script>


const GAS_URL =
"https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";


const schedule=[

{
name:"1限",
start:"09:20",
end:"10:10"
},

{
name:"2限",
start:"10:20",
end:"11:10"
},

{
name:"3限",
start:"11:20",
end:"12:10"
}

];



const radius=110;


const circleLength=
2*Math.PI*radius;


progress.style.strokeDasharray=
circleLength;


progress.style.strokeDashoffset=
circleLength;



function sec(t){

let [h,m]=t.split(":").map(Number);

return h*3600+m*60;

}


let sound=false;


function tick(){

const now=new Date();


date.textContent=
now.toLocaleDateString(
"ja-JP",
{
dateStyle:"full"
}
);



clock.textContent=
now.toLocaleTimeString(
"ja-JP"
);



const nowSec=
now.getHours()*3600+
now.getMinutes()*60+
now.getSeconds();



let msg="🎉 今日の授業は終了しました";

let rem="";

let percent=100;

let left=99999;



for(const s of schedule){

let start=sec(s.start);

let end=sec(s.end);



if(nowSec<start){

left=start-nowSec;

msg="🕒 次は "+s.name;

rem=
"開始まで "+
Math.floor(left/60)+
"分 "+
String(left%60).padStart(2,"0")+
"秒";

percent=0;

break;

}



if(nowSec>=start && nowSec<end){

left=end-nowSec;

msg="📖 "+s.name+" 授業中";

rem=
"残り "+
Math.floor(left/60)+
"分 "+
String(left%60).padStart(2,"0")+
"秒";


percent=
((nowSec-start)/(end-start))*100;


break;

}

}


status.textContent=msg;

remain.textContent=rem;


progress.style.strokeDashoffset=
circleLength -
(circleLength*percent/100);



if(left<=300){

remain.classList.add("flash");

}else{

remain.classList.remove("flash");

}


}


tick();

setInterval(tick,1000);
// =============================
// GAS キーワード取得システム
// =============================


async function loadKeywords(){


const todayBox =
document.getElementById("today");


const historyBox =
document.getElementById("history");



try{


const res =
await fetch(GAS_URL);



const data =
await res.json();



const today =
new Date()
.toLocaleDateString("sv-SE");



const groups={};



for(const item of data){


if(!item.date)
continue;



const d =
new Date(item.date)
.toLocaleDateString("sv-SE");



if(!groups[d]){

groups[d]=[];

}


groups[d].push(item);


}




// =====================
// 今日
// =====================


let todayHTML="";



if(groups[today]){


groups[today]
.forEach(item=>{


todayHTML += createCard(item);


});


}else{


todayHTML=
`
<div class="keyword today">
🎌 本日のキーワードはありません
</div>
`;

}



todayBox.innerHTML=
todayHTML;




// =====================
// 過去履歴
// =====================


let historyHTML="";



Object.keys(groups)

.sort()

.reverse()

.forEach(date=>{


if(date===today)
return;



historyHTML +=
`

<div class="keyword history">

<b>
📅 ${date}
</b>

<br><br>

`;



groups[date].forEach(item=>{


historyHTML +=
createCard(item);


});



historyHTML +=

`

</div>

`;



});



historyBox.innerHTML=
historyHTML ||
`
<div class="keyword history">

まだ履歴がありません

</div>
`;



}catch(e){


todayBox.innerHTML=
`
<div class="keyword">

⚠️ キーワード取得失敗

</div>
`;


historyBox.innerHTML="";


console.error(e);


}


}





// =============================
// カード生成
// =============================


function createCard(item){


let icon="📝";

let title="その他";

let text="";



if(item.mode==="登校"){


icon="🏫";

title="登校";

text=item.inKey || "";



}else if(item.mode==="下校"){


icon="🏠";

title="下校";

text=item.outKey || "";



}else if(item.type==="授業"){


icon="📚";

title=item.subject || "授業";

text=item.lessonKey || "";


}




return `

<div class="keyword">

${icon}

<b>${title}</b>

<br>

${text}

</div>

`;

}





loadKeywords();



setInterval(
loadKeywords,
30000
);



</script>


</body>

</html>
