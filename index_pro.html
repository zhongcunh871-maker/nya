<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>授業タイマー Pro</title>
<style>
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:#fff}
.card{width:min(900px,100%);background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.2);border-radius:28px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1{text-align:center;margin:0}.top{text-align:center}.clock{font-size:64px;font-weight:700}.status{font-size:34px;margin:12px 0}.remain{font-size:42px;color:#fde68a}
.bar{height:22px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#eab308);transition:width 1s}
.grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:20px}.item{background:rgba(255,255,255,.12);padding:16px;border-radius:16px;font-size:22px}.footer{text-align:center;opacity:.8;margin-top:16px}
</style></head><body><div class=card><h1>📚 授業タイマー Pro</h1><div class=top><div id=date></div><div class=clock id=clock></div><div class=status id=status></div><div class=bar><div id=fill class=fill></div></div><div class=remain id=remain></div></div><div class=grid id=keywords><div class=item>読み込み中...</div></div><div class=footer>GAS連携対応</div></div>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbxKQU0nkigff43QcWPp9tEEtIFxH57Bn89c3qYH6Q2BZd-_z3L2DszNaPY2Ka6XlweZ/exec";
const schedule=[{name:"1限",start:"09:20",end:"10:10"},{name:"2限",start:"10:20",end:"11:10"},{name:"3限",start:"11:20",end:"12:10"}];
const sec=t=>{let[a,b]=t.split(":").map(Number);return a*3600+b*60}
function tick(){let n=new Date(),s=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();date.textContent=n.toLocaleDateString("ja-JP",{dateStyle:"full"});clock.textContent=n.toLocaleTimeString("ja-JP");
let st="🎉 今日の授業は終了しました",rm="",p=100;
for(let l of schedule){let a=sec(l.start),b=sec(l.end);if(s<a){st="🕒 次は "+l.name;let left=a-s;rm=`開始まで ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;p=0;break}
if(s>=a&&s<b){let left=b-s;st="📖 "+l.name+" 授業中";rm=`残り ${Math.floor(left/60)}分 ${String(left%60).padStart(2,"0")}秒`;p=(s-a)/(b-a)*100;break}}
status.textContent=st;remain.textContent=rm;fill.style.width=p+"%";}
async function load(){try{let d=await (await fetch(GAS_URL)).json();let t=new Date().toLocaleDateString("sv-SE");let h="";
d.forEach(i=>{if(!i.date)return;let x=new Date(i.date).toLocaleDateString("sv-SE");if(x!==t)return;
if(i.mode==="登校")h+=`<div class=item>🏫 登校：${i.inKey}</div>`;
if(i.type==="授業")h+=`<div class=item><b>${i.subject}</b><br>${i.lessonKey}</div>`;
if(i.mode==="下校")h+=`<div class=item>🏠 下校：${i.outKey}</div>`;});
keywords.innerHTML=h||"<div class=item>🎌 本日は休日です</div>";}catch{keywords.innerHTML="<div class=item>⚠️ 読み込みエラー</div>";}}
tick();load();setInterval(tick,1000);setInterval(load,30000);
</script></body></html>
